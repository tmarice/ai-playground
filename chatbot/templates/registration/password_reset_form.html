<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset password | Chatbot</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d12;
        --surface: #151923;
        --surface-2: #1b2130;
        --border: #263047;
        --text: #e6e9f2;
        --muted: #9aa3b2;
        --accent: #5aa9ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, #182235 0%, transparent 55%),
          linear-gradient(160deg, #0b0d12 20%, #0f1420 100%);
      }

      .card {
        width: min(420px, 92vw);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 32px 30px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 20px;
      }

      .subtitle {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 14px;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-bottom: 16px;
      }

      label {
        font-size: 13px;
        color: var(--muted);
      }

      input {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text);
        padding: 12px 14px;
        font-size: 14px;
      }

      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(90, 169, 255, 0.2);
      }

      .error {
        background: rgba(255, 117, 117, 0.12);
        border: 1px solid rgba(255, 117, 117, 0.4);
        color: #ffb3b3;
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 13px;
        margin-bottom: 14px;
      }

      .field-errors {
        color: #ffb3b3;
        font-size: 12px;
      }

      .actions {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      button {
        border-radius: 12px;
        border: none;
        padding: 12px 16px;
        font-size: 15px;
        font-weight: 600;
        background: var(--accent);
        color: #0b0d12;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.05);
      }

      .meta {
        text-align: center;
        color: var(--muted);
        font-size: 12px;
      }

      .meta a {
        color: var(--accent);
        text-decoration: none;
      }

      .meta a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Reset your password</h1>
      <p class="subtitle">We will email you a link to reset your password.</p>

      {% if form.non_field_errors %}
        <div class="error">{{ form.non_field_errors }}</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}

        <div class="field">
          <label for="id_email">Email address</label>
          <input
            type="email"
            name="email"
            id="id_email"
            autocomplete="email"
            required
            value="{{ form.email.value|default_if_none:'' }}"
          >
          {% if form.email.errors %}
            <div class="field-errors">{{ form.email.errors }}</div>
          {% endif %}
        </div>

        <div class="actions">
          <button type="submit">Send reset link</button>
          <div class="meta">
            <a href="{% url 'accounts:login' %}">Back to sign in</a>
          </div>
        </div>
      </form>
    </main>
  </body>
</html>
