<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Password updated | Chatbot</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d12;
        --surface: #151923;
        --border: #263047;
        --text: #e6e9f2;
        --muted: #9aa3b2;
        --accent: #5aa9ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, #182235 0%, transparent 55%),
          linear-gradient(160deg, #0b0d12 20%, #0f1420 100%);
      }

      .card {
        width: min(420px, 92vw);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 32px 30px;
        text-align: center;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
      }

      a {
        display: inline-block;
        padding: 10px 16px;
        border-radius: 12px;
        background: var(--accent);
        color: #0b0d12;
        font-weight: 600;
        text-decoration: none;
      }

      a:hover {
        filter: brightness(1.05);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Password updated</h1>
      <p>You can now sign in with your new password.</p>
      <a href="{% url 'accounts:login' %}">Sign in</a>
    </main>
  </body>
</html>
