<section
  class="messages"
  id="chat-window"
  data-chat-uuid="{{ chat.uuid }}"
  data-last-seq-id=""
>
  <div class="message user">
    {{ user_message.content|linebreaksbr }}
  </div>
  <div
    class="message assistant"
    data-message-uuid="{{ assistant_message.uuid }}"
  >
    <div
      class="llm-response"
      data-message-uuid="{{ assistant_message.uuid }}"
      data-chat-uuid="{{ chat.uuid }}"
    >
      <span class="llm-placeholder">Waiting for {{ provider.provider_type }}...</span>
    </div>
  </div>
</section>
