services:
  web:
    build: .
    command: ["uv", "run", "--no-sync", "--active", "python", "manage.py", "runserver", "0:8000"]
    volumes:
      - .:/app
    stdin_open: true
    tty: true
    environment:
      PYTHONDBREAKPOINT: "ipdb.set_trace()"
      DJANGO_SETTINGS_MODULE: chatbot.settings.web
      SECRET_KEY: "change-me"
      DEBUG: "1"
      ALLOWED_HOSTS: "*"
      DATABASE_URL: "postgresql://chatbot:chatbot@db:5432/chatbot"
      REDIS_URL: "redis://redis:6379/0"
      REDIS_SESSIONS_URL: "redis://redis:6379/1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  bolt:
    build: .
    command: ["uv", "run", "--no-sync", "--active", "python", "manage.py", "runbolt", "--host", "0.0.0.0", "--port", "8001"]
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: chatbot.settings.api
      SECRET_KEY: "change-me"
      DEBUG: "1"
      ALLOWED_HOSTS: "*"
      DATABASE_URL: "postgresql://chatbot:chatbot@db:5432/chatbot"
      REDIS_URL: "redis://redis:6379/0"
      REDIS_SESSIONS_URL: "redis://redis:6379/1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  procrastinate:
    build: .
    command: ["uv", "run", "--no-sync", "--active", "python", "manage.py", "procrastinate", "worker", "--concurrency", "4"]
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: chatbot.settings.procrastinate
    healthcheck:
      test: ["CMD", "uv", "run", "--no-sync", "--active", "python", "manage.py", "procrastinate", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - bolt

  db:
    image: postgres:18
    environment:
      POSTGRES_DB: chatbot
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
