services:
  web:
    build: .
    command: ["gunicorn", "document-chatbot.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "3", "--timeout", "60"]
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: document-chatbot.settings.web
      SECRET_KEY: "change-me"
      DEBUG: "1"
      ALLOWED_HOSTS: "*"
      DATABASE_URL: "postgresql://document-chatbot:document-chatbot@db:5432/document-chatbot"
      REDIS_URL: "redis://redis:6379/0"
      REDIS_SESSIONS_URL: "redis://redis:6379/1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  bolt:
    build: .
    command: ["python", "manage.py", "runbolt", "--host", "0.0.0.0", "--port", "8001"]
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: document-chatbot.settings.api
      SECRET_KEY: "change-me"
      DEBUG: "1"
      ALLOWED_HOSTS: "*"
      DATABASE_URL: "postgresql://document-chatbot:document-chatbot@db:5432/chatbot"
      REDIS_URL: "redis://redis:6379/0"
      REDIS_SESSIONS_URL: "redis://redis:6379/1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - bolt

  db:
    image: postgres:18
    environment:
      POSTGRES_DB: document-chatbot
      POSTGRES_USER: document-chatbot
      POSTGRES_PASSWORD: document-chatbot
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
